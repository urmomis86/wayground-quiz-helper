name: Validate and Release

on:
  push:
    branches: [ main ]
    paths:
      - 'wayground-userscript.user.js'
      - 'CHANGELOG.md'

# Prevent concurrent runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from script
      id: get_version
      run: |
        VERSION=$(grep -oP '@version\s+\K[0-9.]+' wayground-userscript.user.js)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Script version: $VERSION"

    - name: Validate version format
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Invalid version format: $VERSION"
          exit 1
        fi
        echo "✅ Version format valid: $VERSION"

    - name: Check CHANGELOG updated
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        if ! grep -q "$VERSION" CHANGELOG.md; then
          echo "⚠️ Version $VERSION not found in CHANGELOG.md"
        else
          echo "✅ CHANGELOG.md contains version $VERSION"
        fi

  release:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ needs.validate.outputs.version }}
        name: Version ${{ needs.validate.outputs.version }}
        body: |
          ## Wayground Quiz Helper v${{ needs.validate.outputs.version }}

          See [CHANGELOG.md](./CHANGELOG.md) for details.
        draft: false
        prerelease: false
        files: wayground-userscript.user.js
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
